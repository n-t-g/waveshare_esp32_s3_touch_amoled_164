; PlatformIO configuration for Waveshare ESP32-S3-Touch-AMOLED-1.64
; Board: ESP32-S3R8 @ 240 MHz, 16 MB Flash, 8 MB PSRAM
; Display: 1.64" AMOLED CO5300, 280x456, QSPI
; Touch: FT3168, I2C (SDA=GPIO47, SCL=GPIO48)

[env:waveshare-esp32s3-touch-amoled-164]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Clock & flash settings
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Upload settings
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL config location
    -DLV_CONF_INCLUDE_SIMPLE
    ; Display resolution
    -DDISPLAY_WIDTH=280
    -DDISPLAY_HEIGHT=456
    ; Touch I2C pins
    -DTOUCH_SDA=47
    -DTOUCH_SCL=48
    -DTOUCH_INT=-1
    -DTOUCH_RST=-1
    ; Display QSPI pins
    -DDISPLAY_CS=9
    -DDISPLAY_SCK=10
    -DDISPLAY_D0=11
    -DDISPLAY_D1=12
    -DDISPLAY_D2=13
    -DDISPLAY_D3=14
    -DDISPLAY_RST=21

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lvgl/lvgl@^9.2.2

; PlatformIO library search paths
lib_ldf_mode = deep+
lib_extra_dirs =
    include
